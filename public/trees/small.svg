<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none">
  <!-- Soil mound -->
  <ellipse cx="80" cy="182" rx="48" ry="12" fill="#c8a97a" opacity="0.5"/>
  <!-- Trunk -->
  <path d="M80 178 Q76 150 78 120" stroke="#7a5230" stroke-width="10" stroke-linecap="round"/>
  <!-- Left branch -->
  <path d="M78 138 Q58 128 44 118" stroke="#7a5230" stroke-width="6" stroke-linecap="round"/>
  <!-- Right branch -->
  <path d="M79 132 Q100 122 114 112" stroke="#8a6240" stroke-width="6" stroke-linecap="round"/>
  <!-- Main canopy (green with a hint of pink) -->
  <ellipse cx="80" cy="96" rx="50" ry="44" fill="#aad49a"/>
  <!-- Pink blossom clusters -->
  <circle cx="60" cy="82" r="18" fill="#f9b8ce" opacity="0.75"/>
  <circle cx="98" cy="78" r="16" fill="#f4c6d6" opacity="0.7"/>
  <circle cx="80" cy="68" r="14" fill="#fddde8" opacity="0.8"/>
  <!-- A few small petals floating -->
  <ellipse cx="36" cy="105" rx="4" ry="3" fill="#f9b8ce" opacity="0.6" transform="rotate(-20 36 105)"/>
  <ellipse cx="124" cy="98" rx="4" ry="3" fill="#fddde8" opacity="0.6" transform="rotate(15 124 98)"/>
</svg>
